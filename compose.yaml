name: service-of-import

x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-Service of Import}
  APP_ENVIRONMENT: ${APP_ENVIRONMENT:-local}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://import_service:import_service@postgres:5432/import_service}
  TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgresql+psycopg://import_service:import_service@postgres:5432/import_service_test}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
  S3_BUCKET: ${S3_BUCKET:-stock-reports}
  S3_REGION: ${S3_REGION:-us-east-1}
  WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-2}
  WORKER_ADVISORY_LOCK_KEY: ${WORKER_ADVISORY_LOCK_KEY:-7314602941}
  VALIDATION_BATCH_SIZE: ${VALIDATION_BATCH_SIZE:-500}

services:
  postgres:
    image: postgres:16.6-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-import_service}
      POSTGRES_USER: ${POSTGRES_USER:-import_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-import_service}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2024-05-09T17-04-24Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-stock-reports}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
        mc mb --ignore-existing "local/$${S3_BUCKET}";
    restart: "no"

  api:
    image: service-of-import:local
    build:
      context: .
      dockerfile: Dockerfile
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=2)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  worker:
    image: service-of-import:local
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: ["python", "-m", "app.worker"]

volumes:
  postgres_data:
  minio_data:
