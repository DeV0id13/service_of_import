name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.11.8"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v9
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install locked dependencies
        run: uv sync --locked --extra dev

      - name: Ruff lint
        run: uv run --locked ruff check .

      - name: Ruff format check
        run: uv run --locked ruff format --check .

      - name: Mypy
        run: uv run --locked mypy app tests

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v9
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install locked dependencies
        run: uv sync --locked --extra dev

      - name: Run unit tests
        run: uv run --locked pytest -q -ra -m unit

  integration:
    name: Integration and smoke
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Prepare local configuration
        run: cp .env.example .env

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build application image
        run: docker compose build

      - name: Start PostgreSQL and MinIO
        run: docker compose up -d --wait postgres minio

      - name: Create MinIO bucket
        run: docker compose up --no-deps minio-init

      - name: Apply and verify migrations
        run: |
          docker compose run --rm api alembic upgrade head
          docker compose run --rm api alembic current
          docker compose run --rm api alembic check

      - name: Run integration tests
        run: docker compose run --rm api pytest -q -ra -m integration

      - name: Start API and worker
        run: docker compose up -d api worker

      - name: Wait for readiness
        shell: bash
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://localhost:8000/health/ready; then
              exit 0
            fi
            sleep 2
          done
          echo "API readiness timeout" >&2
          exit 1

      - name: Run smoke scenario
        run: sh scripts/smoke.sh

      - name: Show Compose diagnostics on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --timestamps

      - name: Stop Compose services
        if: always()
        run: docker compose down --remove-orphans
